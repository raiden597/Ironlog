<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="#111111"/>
  <!-- Subtle inner border -->
  <rect x="4" y="4" width="56" height="56" rx="11" stroke="#c8ff00" stroke-width="1.5" stroke-opacity="0.2"/>
  <!-- Barbell shaft -->
  <rect x="6" y="30" width="52" height="4" rx="2" fill="#c8ff00" fill-opacity="0.12"/>
  <!-- Outer collars -->
  <rect x="10" y="28" width="6" height="8" rx="2" fill="#c8ff00"/>
  <rect x="48" y="28" width="6" height="8" rx="2" fill="#c8ff00"/>
  <!-- Inner plates (slightly taller) -->
  <rect x="18" y="22" width="5" height="20" rx="2.5" fill="#c8ff00" fill-opacity="0.85"/>
  <rect x="41" y="22" width="5" height="20" rx="2.5" fill="#c8ff00" fill-opacity="0.85"/>
  <!-- Center plates (tallest) -->
  <rect x="25" y="18" width="14" height="28" rx="3" fill="#c8ff00"/>
  <!-- Handle grip detail -->
  <rect x="29" y="14" width="6" height="36" rx="3" fill="#c8ff00" fill-opacity="0.55"/>
</svg>
